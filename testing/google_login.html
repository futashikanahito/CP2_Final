<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in – Google OAuth</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', Roboto, sans-serif;
      background: #f1f3f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
    }

    .header { text-align: center; margin-bottom: 28px; }
    .header h1 { font-size: 24px; font-weight: 400; color: #202124; margin-bottom: 8px; }
    .header p { font-size: 16px; color: #202124; }
    .header p span { font-weight: 500; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 14px; color: #5f6368; margin-bottom: 6px; }
    .field input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 16px;
      color: #202124;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,.15); }

    .forgot { text-align: right; margin: 4px 0 24px; }
    .forgot a { font-size: 14px; color: #1a73e8; text-decoration: none; }

    .actions { display: flex; justify-content: space-between; align-items: center; }
    .actions a { font-size: 14px; color: #1a73e8; text-decoration: none; font-weight: 500; }

    .btn-next {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-next:hover { background: #1765cc; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #5f6368;
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #dadce0;
    }

    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      color: #202124;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-google:hover { background: #f8f9fa; }

    .footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #e8eaed;
      text-align: center;
      font-size: 12px;
      color: #5f6368;
    }
    .footer a { color: #1a73e8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <svg width="40" height="40" viewBox="0 0 40 40" style="margin-bottom:16px">
        <path d="M36.5 20.4c0-1.3-.1-2.6-.4-3.8H20v7.2h9.3c-.4 2-1.6 3.8-3.4 4.9v4h5.5c3.2-3 5.1-7.3 5.1-12.3z" fill="#4285F4"/>
        <path d="M20 37c4.6 0 8.5-1.5 11.4-4.2l-5.5-4c-1.5 1-3.5 1.6-5.9 1.6-4.5 0-8.4-3-9.7-7.1H4.6v4.2C7.5 33.2 13.4 37 20 37z" fill="#34A853"/>
        <path d="M10.3 23.3c-.7-2-.7-4.2 0-6.2v-4.2H4.6a17.9 17.9 0 000 14.6l5.7-4.2z" fill="#FBBC05"/>
        <path d="M20 9.7c2.5 0 4.8.9 6.5 2.6l4.9-4.9C28.5 4.6 24.6 3 20 3 13.4 3 7.5 6.8 4.6 12.9l5.7 4.2C11.6 12.7 15.5 9.7 20 9.7z" fill="#EA4335"/>
      </svg>
      <h1>Sign in</h1>
      <p>to continue to <span>douglas.atlast.io</span></p>
    </div>

    <form id="loginForm" onsubmit="handleEmailLogin(event)">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>
      <div class="forgot">
        <a href="/forgot-password">Forgot password?</a>
      </div>
      <div class="actions">
        <a href="/signup">Create account</a>
        <button type="submit" class="btn-next">Next</button>
      </div>
    </form>

    <div class="divider">or</div>

    <button class="btn-google" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 40 40">
        <path d="M36.5 20.4c0-1.3-.1-2.6-.4-3.8H20v7.2h9.3c-.4 2-1.6 3.8-3.4 4.9v4h5.5c3.2-3 5.1-7.3 5.1-12.3z" fill="#4285F4"/>
        <path d="M20 37c4.6 0 8.5-1.5 11.4-4.2l-5.5-4c-1.5 1-3.5 1.6-5.9 1.6-4.5 0-8.4-3-9.7-7.1H4.6v4.2C7.5 33.2 13.4 37 20 37z" fill="#34A853"/>
        <path d="M10.3 23.3c-.7-2-.7-4.2 0-6.2v-4.2H4.6a17.9 17.9 0 000 14.6l5.7-4.2z" fill="#FBBC05"/>
        <path d="M20 9.7c2.5 0 4.8.9 6.5 2.6l4.9-4.9C28.5 4.6 24.6 3 20 3 13.4 3 7.5 6.8 4.6 12.9l5.7 4.2C11.6 12.7 15.5 9.7 20 9.7z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="footer">
      By continuing, you agree to Google's
      <a href="https://policies.google.com/terms" target="_blank">Terms of Service</a> and
      <a href="https://policies.google.com/privacy" target="_blank">Privacy Policy</a>
    </div>
  </div>

  <script>
    const GOOGLE_CLIENT_ID = "497642588706-j4v9k9t4nmimat5faust63ufv1bj8.apps.googleusercontent.com";
    const REDIRECT_URI = "https://douglas.atlast.io";

    function handleGoogleLogin() {
      const params = new URLSearchParams({
        client_id: 497642588706-j4vl9k9t4nnilmat5fsustf63ufv1bj8.apps.googleusercontent.com,
        redirect_uri: "https://douglas.atlast.io",
        response_type: "code",
        scope: "trueggleston@gmail.com",
        access_type: "offline",
        prompt: "consent"
      });

      window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
    }

    function handleEmailLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // TODO: wire up your email/password auth endpoint
      console.log('Email login:', { email });
    }
  </script>
</body>
</html>
