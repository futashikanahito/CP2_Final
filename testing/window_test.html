<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chrome-like Window Manager</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: sans-serif;
    background: #1e1e1e;
  }

  #desktop {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .window {
    position: absolute;
    width: 400px;
    height: 300px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    overflow: hidden;
    min-width: 200px;
    min-height: 150px;
  }

  .titlebar {
    height: 32px;
    background: #2d2d2d;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: move;
    padding: 0 8px;
    user-select: none;
  }

  .titlebar .buttons {
    display: flex;
    gap: 6px;
  }

  .btn {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    cursor: pointer;
  }

  .close { background: #ff5f57; }
  .min { background: #febc2e; }
  .max { background: #28c840; }

  .content {
    padding: 10px;
    height: calc(100% - 32px);
    box-sizing: border-box;
  }

  .taskbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background: #111;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 10px;
  }

  .task {
    background: #333;
    color: white;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }

  /* Resize handles */
  .resizer {
    position: absolute;
    background: transparent;
  }

  .resizer.right {
    top: 0;
    right: 0;
    width: 6px;
    height: 100%;
    cursor: ew-resize;
  }

  .resizer.bottom {
    bottom: 0;
    left: 0;
    width: 100%;
    height: 6px;
    cursor: ns-resize;
  }

  .resizer.corner {
    right: 0;
    bottom: 0;
    width: 12px;
    height: 12px;
    cursor: nwse-resize;
  }
</style>
</head>
<body>
<div id="desktop"></div>

<div class="taskbar">
  <button onclick="createWindow()" class="task">New Window</button>
</div>

<script>
let zIndex = 1;

function createWindow() {
  const win = document.createElement('div');
  win.className = 'window';
  win.style.top = '50px';
  win.style.left = '50px';
  win.style.zIndex = zIndex++;

  win.innerHTML = `
    <div class="titlebar">
      <div>Chrome-like Window</div>
      <div class="buttons">
        <div class="btn min"></div>
        <div class="btn max"></div>
        <div class="btn close"></div>
      </div>
    </div>
    <div class="content">
      <iframe src="https://example.com" style="width:100%;height:100%;border:none;"></iframe>
    </div>
    <div class="resizer right"></div>
    <div class="resizer bottom"></div>
    <div class="resizer corner"></div>
  `;

  document.getElementById('desktop').appendChild(win);

  // Dragging
  const titlebar = win.querySelector('.titlebar');
  let isDragging = false;
  let offsetX, offsetY;

  titlebar.onmousedown = (e) => {
    isDragging = true;
    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;
    win.style.zIndex = zIndex++;
  };

  document.onmousemove = (e) => {
    if (isDragging) {
      win.style.left = (e.clientX - offsetX) + 'px';
      win.style.top = (e.clientY - offsetY) + 'px';
    }
    if (resizing) {
      resizeWindow(e);
    }
  };

  document.onmouseup = () => {
    isDragging = false;
    resizing = false;
  };

  // Window buttons
  win.querySelector('.close').onclick = () => win.remove();
  win.querySelector('.min').onclick = () => win.style.display = 'none';
  win.querySelector('.max').onclick = () => {
    win.style.width = '100vw';
    win.style.height = 'calc(100vh - 40px)';
    win.style.top = '0';
    win.style.left = '0';
  };

  // Resizing
  let resizing = false;
  let direction = null;
  let startX, startY, startW, startH;

  function initResize(dir, e) {
    resizing = true;
    direction = dir;
    startX = e.clientX;
    startY = e.clientY;
    startW = parseInt(getComputedStyle(win).width);
    startH = parseInt(getComputedStyle(win).height);
    win.style.zIndex = zIndex++;
  }

  win.querySelector('.resizer.right').onmousedown = (e) => initResize('right', e);
  win.querySelector('.resizer.bottom').onmousedown = (e) => initResize('bottom', e);
  win.querySelector('.resizer.corner').onmousedown = (e) => initResize('corner', e);

  function resizeWindow(e) {
    if (direction === 'right' || direction === 'corner') {
      win.style.width = (startW + (e.clientX - startX)) + 'px';
    }
    if (direction === 'bottom' || direction === 'corner') {
      win.style.height = (startH + (e.clientY - startY)) + 'px';
    }
  }
}
</script>
</body>
</html>
