<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat Test t13</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <audio id="ping" src="https://www.soundjay.com/buttons/sounds/button-09.mp3" preload="auto"></audio>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #ccc; padding: 20px; }
        input, button, select { background: #2e2e2e; color: #ccc; border: 1px solid #444; padding: 6px 10px; margin: 4px; }
        button { cursor: pointer; }
        button:hover { background: #3e3e3e; }
        #chat { border: 1px solid #444; padding: 10px; height: 300px; overflow-y: auto; margin: 10px 0; }
        .section { margin: 16px 0; border-top: 1px solid #333; padding-top: 12px; }
        #diag-box { background: #252525; border: 1px solid #444; padding: 10px; margin-bottom: 20px; border-radius: 5px; }
        .stat { margin: 4px 0; font-size: 0.9em; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 10px; background: grey; }
        .ok { background: #4caf50; } .err { background: #f44336; } .wait { background: #ff9800; }
        #gif-picker { display: none; background: #252525; border: 1px solid #444; padding: 8px; margin: 4px 0; max-height: 200px; overflow-y: auto; }
        #gif-picker img { width: 120px; height: 80px; object-fit: cover; cursor: pointer; margin: 2px; }
        #gif-picker img:hover { outline: 2px solid #4caf50; }
        .chat-gif { max-width: 200px; max-height: 150px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="diag-box">
        <strong>System Status:</strong>
        <div class="stat"><span id="dot-socket" class="dot"></span> Socket Server: <span id="text-socket">Connecting...</span></div>
        <div class="stat"><span id="dot-api" class="dot"></span> API Backend: <span id="text-api">Checking...</span></div>
        <div class="stat"><span id="dot-video" class="dot"></span> Room Status: <span id="text-video">Waiting...</span></div>
        <button onclick="runDiagnostics()" style="font-size: 0.7em;">Retry Diagnostics</button>
    </div>

    <div class="section">
        <h3>login</h3>
        <input id="username" type="text" placeholder="username">
        <button onclick="login()">login</button>
        <p id="login-status"></p>
        <button onclick="handleGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 40 40" style="vertical-align:middle; margin-right:8px;">
            <path d="M36.5 20.4c0-1.3-.1-2.6-.4-3.8H20v7.2h9.3c-.4 2-1.6 3.8-3.4 4.9v4h5.5c3.2-3 5.1-7.3 5.1-12.3z" fill="#4285F4"/>
            <path d="M20 37c4.6 0 8.5-1.5 11.4-4.2l-5.5-4c-1.5 1-3.5 1.6-5.9 1.6-4.5 0-8.4-3-9.7-7.1H4.6v4.2C7.5 33.2 13.4 37 20 37z" fill="#34A853"/>
            <path d="M10.3 23.3c-.7-2-.7-4.2 0-6.2v-4.2H4.6a17.9 17.9 0 000 14.6l5.7-4.2z" fill="#FBBC05"/>
            <path d="M20 9.7c2.5 0 4.8.9 6.5 2.6l4.9-4.9C28.5 4.6 24.6 3 20 3 13.4 3 7.5 6.8 4.6 12.9l5.7 4.2C11.6 12.7 15.5 9.7 20 9.7z" fill="#EA4335"/>
        </svg>
        Continue with Google
        </button>
    </div>

    <div class="section">
        <h3>chat</h3>
        <select id="chat-server-id" onchange="loadChannels()"><option value="">select server</option></select>
        <select id="chat-channel" onchange="openChannel()"><option value="">select channel</option></select>
        <div id="chat"></div>
        <div id="gif-picker"></div>
        <input id="message-input" type="text" placeholder="type a message or /gif cats">
        <button onclick="sendMessage()">send</button>
    </div>

    <div class="section">
    <h3>Video Call</h3>
    <button onclick="joinCall()">Join Call</button>
    <button onclick="leaveCall()">Leave Call</button>
    <div id="meet" style="height: 400px; width: 100%; background: #000;"></div>
    </div>

<script>
    const BASE = '/api';
    const KLIPY_KEY = 's8odzNYngyB2TQFkGjoRBldhynfFTJcVca9p9T5YGxsSQkhuqB0n7u1MfL7sBdqW';
    let currentUser = '', currentServer = '', currentChannel = '', jitsiApi = null;
    let socket = null;
    let gifSearchTimeout = null;

    function initSocket() {
        if (typeof io !== 'undefined') {
            socket = io(window.location.origin, {
                path: "/socket.io",
                transports: ["websocket"],
            });
            socket.on('connect', () => setStat('socket', 'Connected', 'ok'));
            socket.on('connect_error', (e) => setStat('socket', 'Error: ' + e.message, 'err'));
        } else {
            setStat('socket', 'Library Load Error', 'err');
        }
    }

    function setStat(id, text, state) {
        document.getElementById(`text-${id}`).innerText = text;
        document.getElementById(`dot-${id}`).className = `dot ${state}`;
    }

    async function runDiagnostics() {
        setStat('api', 'Testing...', 'wait');
        try {
            const url = (BASE + `/user/servers/${currentUser || 'test'}`).replace(/\/+/g, '/');
            const r = await fetch(url);
            setStat('api', r.ok || r.status === 404 ? 'Healthy' : 'Error ' + r.status, 'ok');
        } catch (e) {
            setStat('api', 'Unreachable', 'err');
        }
    }

    async function login() {
        const username = document.getElementById('username').value.trim();
        if (!username) return;
        currentUser = username;
        try {
            const url = (BASE + `/user/servers/${username}`).replace(/\/+/g, '/');
            const r = await fetch(url);
            if (r.status === 404) {
                if (confirm('Create account?')) await fetch((BASE + '/user/create').replace(/\/+/g, '/'), {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username})
                });
            }
            document.getElementById('login-status').innerText = `Logged in: ${username}`;
            loadServers();
        } catch(e) { console.error("Login failed", e); }
    }

    async function loadServers() {
        try {
            const url = (BASE + `/user/servers/${currentUser}`).replace(/\/+/g, '/');
            const servers = await (await fetch(url)).json();
            const select = document.getElementById('chat-server-id');
            select.innerHTML = '<option value="">select server</option>';
            servers.forEach(s => select.innerHTML += `<option value="${s}">${s}</option>`);
        } catch(e) { console.error("Load servers failed", e); }
    }

    async function loadChannels() {
        const sid = document.getElementById('chat-server-id').value;
        const url = (BASE + `/server/channels/${sid}`).replace(/\/+/g, '/');
        const channels = await (await fetch(url)).json();
        const select = document.getElementById('chat-channel');
        select.innerHTML = '<option value="">select channel</option>';
        channels.forEach(c => select.innerHTML += `<option value="${c}">#${c}</option>`);
    }

    async function openChannel() {
        const sid = document.getElementById('chat-server-id').value;
        const chan = document.getElementById('chat-channel').value;
        if (!sid || !chan) return;
        if (socket && currentServer && currentChannel) {
            socket.emit('leave', {server_id: currentServer, channel: currentChannel});
        }
        currentServer = sid;
        currentChannel = chan;
        if (socket) socket.emit('join', {server_id: sid, channel: chan});
        const url = (BASE + `/message/get/${sid}/${chan}`).replace(/\/+/g, '/');
        const messages = await (await fetch(url)).json();
        const chat = document.getElementById('chat');
        chat.innerHTML = '';
        messages.forEach(m => renderMessage(m));
        chat.scrollTop = chat.scrollHeight;
    }

    function renderMessage(m) {
        const chat = document.getElementById('chat');
        if (m.message.startsWith('__GIF__')) {
            const url = m.message.replace('__GIF__', '');
            chat.innerHTML += `<div><strong>${m.id}:</strong> <img src="${url}" class="chat-gif"></div>`;
        } else {
            chat.innerHTML += `<div><strong>${m.id}:</strong> ${m.message}</div>`;
        }
    }

    async function searchGifs(query) {
    const picker = document.getElementById('gif-picker');
    if (!query) { picker.style.display = 'none'; return; }
    try {
        const r = await fetch(`https://api.klipy.com/api/v1/${KLIPY_KEY}/gifs/search?q=${encodeURIComponent(query)}&per_page=12`);
        const data = await r.json();
        console.log('Klipy response:', data);
        picker.style.display = 'block';
        picker.innerHTML = '';
        data.data.data.forEach(gif => {
        const img = document.createElement('img');
        img.src = gif.file.sm.gif.url;
        img.onclick = () => sendGif(gif.file.hd.gif.url);
        picker.appendChild(img);
    });
    } catch(e) { console.error('GIF search failed', e); }
}

    async function sendGif(url) {
        document.getElementById('gif-picker').style.display = 'none';
        document.getElementById('message-input').value = '';
        const apiUrl = (BASE + '/message/send').replace(/\/+/g, '/');
        await fetch(apiUrl, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: currentUser, server_id: currentServer, channel: currentChannel, msg: `__GIF__${url}` })
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('message-input').addEventListener('input', (e) => {
            const val = e.target.value;
            if (val.startsWith('/gif ')) {
                const query = val.slice(5).trim();
                clearTimeout(gifSearchTimeout);
                gifSearchTimeout = setTimeout(() => searchGifs(query), 400);
            } else {
                document.getElementById('gif-picker').style.display = 'none';
            }
        });

        document.getElementById('message-input').addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('gif-picker').style.display = 'none';
            }
        });
    });

    function joinCall() {
        if (!currentServer || !currentChannel) { alert("Join a channel first"); return; }
        setStat('video', 'Joining...', 'wait');
        const room = `ChatApp_${currentServer}_${currentChannel}`;
        document.getElementById('meet').innerHTML = `
            <iframe src="https://meet.douglas.atlast.io/${room}"
                allow="camera; microphone; fullscreen; display-capture"
                style="width:100%; height:400px; border:none;">
            </iframe>`;
        setStat('video', 'Live', 'ok');
    }

    function leaveCall() {
        document.getElementById('meet').innerHTML = '';
        setStat('video', 'Left', 'wait');
    }

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const msg = input.value.trim();
        if (!msg || !currentServer || !currentChannel) return;
        if (msg.startsWith('/gif')) { return; }
        const url = (BASE + '/message/send').replace(/\/+/g, '/');
        await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: currentUser, server_id: currentServer, channel: currentChannel, msg: msg })
        });
        input.value = '';
    }

    window.onload = () => {
        initSocket();
        socket.on('new-message', (msg) => {
            renderMessage(msg);
            const chat = document.getElementById('chat');
            chat.scrollTop = chat.scrollHeight;
        });
        runDiagnostics();
    };

    const GOOGLE_CLIENT_ID = "75087933683-s5so198alkfphrc728rtjuqucggemhp0.apps.googleusercontent.com";

    function handleGoogleLogin() {
        const params = new URLSearchParams({
            client_id: GOOGLE_CLIENT_ID,
            redirect_uri: window.location.origin,
            response_type: "code",
            scope: "openid email profile",
            access_type: "offline",
            prompt: "consent"
        });
        window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
    }
</script>
</body>
</html>
