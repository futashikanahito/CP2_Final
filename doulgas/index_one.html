<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #ccc; padding: 20px; }
        input, button, select { background: #2e2e2e; color: #ccc; border: 1px solid #444; padding: 6px 10px; margin: 4px; }
        button { cursor: pointer; }
        button:hover { background: #3e3e3e; }
        #chat { border: 1px solid #444; padding: 10px; height: 300px; overflow-y: auto; margin: 10px 0; }
        #notifications { color: yellow; font-size: 0.85em; margin: 4px 0; }
        .section { margin: 16px 0; border-top: 1px solid #333; padding-top: 12px; }
        label { display: inline-block; width: 120px; }
    </style>
</head>
<body>

<h2>chat test</h2>

<!-- login -->
<div class="section">
    <h3>login</h3>
    <label>username</label>
    <input id="username" type="text">
    <button onclick="login()">login / create</button>
    <p id="login-status"></p>
</div>

<!-- servers -->
<div class="section">
    <h3>your servers</h3>
    <div id="server-list">(none)</div>
    <br>
    <label>server id</label><input id="new-server-id" type="text">
    <label>server name</label><input id="new-server-name" type="text">
    <button onclick="createServer()">create server</button>
    <br>
    <label>server id</label><input id="del-server-id" type="text">
    <button onclick="deleteServer()">delete server</button>
    <br>
    <label>server id</label><input id="add-server-id" type="text">
    <label>new user</label><input id="add-username" type="text">
    <button onclick="addUser()">add user</button>
    <p id="server-status"></p>
</div>

<!-- chat -->
<div class="section">
    <h3>chat</h3>
    <label>server id</label>
    <select id="chat-server-id" onchange="loadChannels()">
        <option value="">select server</option>
    </select>
    <label>channel</label>
    <select id="chat-channel" onchange="openChannel()">
        <option value="">select channel</option>
    </select>
    <div id="notifications"></div>
    <div id="chat">(select a server and channel)</div>
    <input id="message-input" type="text" placeholder="type a message">
    <button onclick="sendMessage()">send</button>
</div>

<script>
    const BASE = '/api'
    let currentUser = ''
    let currentServer = ''
    let currentChannel = ''
    const socket = io()

    async function post(url, body) {
        const r = await fetch(BASE + url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        })
        return await r.json()
    }

    async function get(url) {
        const r = await fetch(BASE + url)
        return await r.json()
    }

    async function login() {
        const username = document.getElementById('username').value.trim()
        if (!username) return
        currentUser = username
        const r = await fetch(BASE + `/user/servers/${username}`)
        if (r.status === 404) {
            const create = confirm('user not found, create account?')
            if (create) {
                await post('/user/create', {username})
                document.getElementById('login-status').innerText = `created and logged in as ${username}`
            }
        } else {
            document.getElementById('login-status').innerText = `logged in as ${username}`
        }
        loadServers()
    }

    async function loadServers() {
        if (!currentUser) return
        const servers = await get(`/user/servers/${currentUser}`)
        const list = document.getElementById('server-list')
        const select = document.getElementById('chat-server-id')
        if (!servers.length) {
            list.innerText = '(none)'
            return
        }
        list.innerText = servers.join(', ')
        select.innerHTML = '<option value="">select server</option>'
        servers.forEach(s => {
            select.innerHTML += `<option value="${s}">${s}</option>`
        })
    }

    async function createServer() {
        if (!currentUser) return alert('login first')
        const server_id = document.getElementById('new-server-id').value.trim()
        const name = document.getElementById('new-server-name').value.trim()
        const r = await post('/server/create', {username: currentUser, server_id, name})
        document.getElementById('server-status').innerText = r.msg || r.status
        loadServers()
    }

    async function deleteServer() {
        if (!currentUser) return alert('login first')
        const server_id = document.getElementById('del-server-id').value.trim()
        const r = await post('/server/delete', {username: currentUser, server_id})
        document.getElementById('server-status').innerText = r.msg || r.status
        loadServers()
    }

    async function addUser() {
        if (!currentUser) return alert('login first')
        const server_id = document.getElementById('add-server-id').value.trim()
        const new_user = document.getElementById('add-username').value.trim()
        const r = await post('/server/adduser', {username: currentUser, server_id, new_user})
        document.getElementById('server-status').innerText = r.msg || r.status
    }

    async function loadChannels() {
        const server_id = document.getElementById('chat-server-id').value
        if (!server_id) return
        const channels = await get(`/server/channels/${server_id}`)
        const select = document.getElementById('chat-channel')
        select.innerHTML = '<option value="">select channel</option>'
        channels.forEach(c => {
            select.innerHTML += `<option value="${c}">#${c}</option>`
        })
    }

    async function openChannel() {
        const server_id = document.getElementById('chat-server-id').value
        const channel = document.getElementById('chat-channel').value
        if (!server_id || !channel) return

        if (currentServer && currentChannel) {
            socket.emit('leave', {server_id: currentServer, channel: currentChannel})
        }

        currentServer = server_id
        currentChannel = channel

        socket.emit('join', {server_id, channel})

        const messages = await get(`/message/get/${server_id}/${channel}`)
        const chat = document.getElementById('chat')
        chat.innerHTML = ''
        messages.forEach(m => {
            chat.innerHTML += `<div>${m.id}: ${m.message}</div>`
        })
        chat.scrollTop = chat.scrollHeight
    }

    async function sendMessage() {
    if (!currentUser) return alert('Login first');
    
    const input = document.getElementById('message-input');
    const msg = input.value.trim();
    
    if (!msg || !currentServer || !currentChannel) return;

    try {
        const response = await post('/message/send', { 
            username: currentUser, 
            server_id: currentServer, 
            channel: currentChannel, 
            msg: msg 
        });

        if (response.status === "success") {
            input.value = ''; 
        } else {
            alert("Error: " + response.msg);
        }
    } catch (err) {
        console.error("Failed to send:", err);
    }
}

    socket.on('new-message', function(data) {
        const chat = document.getElementById('chat')
        chat.innerHTML += `<div>${data.id}: ${data.message}</div>`
        chat.scrollTop = chat.scrollHeight
        if (data.id !== currentUser) {
            const notif = document.getElementById('notifications')
            notif.innerText = `new message from ${data.id}`
            setTimeout(() => notif.innerText = '', 3000)
        }
    })

    document.getElementById('message-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sendMessage()
    })
</script>

</body>
</html>
