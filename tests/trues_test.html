<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>
    <style>
        body { background-color: #f0f8ff; font-family: Arial, sans-serif; text-align: center; }
        h1 { color: #2c3e50; }
        .my-button { 
            background-color: #3498db; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
        }
        .my-button:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <h1>Welcome to My Website</h1>
    <p>Click the button below to see a message.</p>
    
    <!-- Working button that triggers an alert -->
    <button class="my-button" onclick="alert('The button is working!')">Click Me!</button>
</body>
</html>
