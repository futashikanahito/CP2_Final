<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkFlow | Settings</title>
    <style>
        /* CSS Variables for easy theme switching */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --panel-bg: #f4f4f5;
            --border-color: #e4e4e7;
            --button-bg: #70b5ff;
            --button-text: #ffffff;
        }

        /* Dark Mode Variables */
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #f4f4f5;
            --panel-bg: #1e1e1e;
            --border-color: #333333;
            --button-bg: #f28d00;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease, filter 0.3s ease;
            filter: brightness(100%);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .settings-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0;
            width: 100%;
            max-width: 500px;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .settings-content {
            padding: 2rem;
        }

        .settings-panel h1 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;

            position: sticky;
            top: 0;
            background-color: var(--panel-bg);
            z-index: 10;
            margin: 0;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .setting-group label {
            font-weight: 600;
            font-size: 0.95rem;
        }

        button {
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.85;
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            padding: 0;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .primary-footer {
            text-align: center;
            padding: 1rem;
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
    </style>
</head>
<body>

    <main>
        <div class="settings-panel">
            <h1>Preferences</h1>

            <div class="settings-content">
                <div class="setting-group">
                    <label>Appearance</label>
                    <button id="theme-btn">Enable Light Mode</button>
                </div>

                <div class="setting-group">
                    <label for="bg-picker">Custom Background Color</label>
                    <input type="color" id="bg-picker" value="#ffffff">
                </div>

                <div class="setting-group">
                    <label for="brightness-slider">UI Brightness</label>
                    <input type="range" id="brightness-slider" min="50" max="150" value="100">
                </div>

                <div class="setting-group">
                    <button id="reset-bg-btn">Reset Background Image</button>
                </div>

                <div class="setting-group">
                    <label for="brightness-slider">Cursor Effect Range</label>
                    <input type="range" id="ce-range" min="1" max="25" value="8">
                </div>

                <div class="setting-group">
                    <label for="brightness-slider">Cursor Effect Distribution</label>
                    <input type="range" id="ce-distribution" min="5" max="15" value="6">
                </div>

                <div class="setting-group">
                    <label for="brightness-slider">Cursor Effect Intensity</label>
                    <input type="range" id="ce-intensity" min=".25" max="3" step=".001" value="2">
                </div>

                <div class="setting-group">
                    <label for="brightness-slider">Cursor Effect Maximum Size</label>
                    <input type="range" id="ce-maximum" min="1" max="25" value="25">
                </div>

                <div class="setting-group">
                    <button id="save-btn">Save</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        const bgPicker = document.getElementById('bg-picker');
        const brightnessSlider = document.getElementById('brightness-slider');
        const root = document.documentElement;

        function send(type, value) {
            window.parent.postMessage({ type, value }, '*');
        }

        const sliders = [
            ['ce-range', 'ce-range', 'ce-range'],
            ['ce-distribution', 'ce-distribution', 'ce-distribution'],
            ['ce-intensity', 'ce-intensity', 'ce-intensity'],
            ['ce-maximum', 'ce-maximum', 'ce-maximum'],
            ['brightness-slider', 'brightness', 'set-brightness'],
        ];

        sliders.forEach(([id, storageKey, type]) => {
            const saved = localStorage.getItem(storageKey);
            if (saved !== null) {
                const el = document.getElementById(id);
                el.value = saved;
                send(type, parseFloat(saved));
            }
        });

        // 1. Light/Light Mode Toggle
        let dashboardIsLight = false;

        themeBtn.addEventListener('click', () => {
            dashboardIsLight = !dashboardIsLight;
            themeBtn.textContent = dashboardIsLight ? 'Enable Dark Mode' : 'Enable Light Mode';
            send('set-theme', dashboardIsLight ? 'light' : 'dark');

            document.body.classList.toggle('dark-mode', !dashboardIsLight);
            const bg = dashboardIsLight ? '#ffffff' : '#121212';
            bgPicker.value = bg;
            document.documentElement.style.setProperty('--bg-color', bg);
        });

        // 2. Custom Background Color 
        bgPicker.addEventListener('input', (e) => {
            root.style.setProperty('--bg-color', e.target.value);
            send('set-bg-color', e.target.value);
        });

        // 3. Brightness Control
        brightnessSlider.addEventListener('input', (e) => {
            localStorage.setItem('brightness', e.target.value);
            document.body.style.filter = `brightness(${e.target.value}%)`;
            send('set-brightness', e.target.value);
        });

        // 4. Save = close
        document.getElementById('save-btn').addEventListener('click', () => {
            window.parent.postMessage({ type: 'close-settings' }, '*');
        });

        // 5. Reset Preferences
        document.getElementById('reset-bg-btn').addEventListener('click', () => {
            send('reset-bg', null);
        });

        // 6. Cursor Effect Range
        document.getElementById('ce-range').addEventListener('input', (e) => {
            localStorage.setItem('ce-range', e.target.value);
            send('ce-range', parseFloat(e.target.value));
        });

        // 7. Cursor Effect Distribution
        document.getElementById('ce-distribution').addEventListener('input', (e) => {
            localStorage.setItem('ce-distribution', e.target.value);
            send('ce-distribution', parseFloat(e.target.value));
        });

        // 8. Cursor Effect Intensity
        document.getElementById('ce-intensity').addEventListener('input', (e) => {
            localStorage.setItem('ce-intensity', e.target.value);
            send('ce-intensity', parseFloat(e.target.value));
        });

        // 9. Cursor Effect Maximum
        document.getElementById('ce-maximum').addEventListener('input', (e) => {
            localStorage.setItem('ce-maximum', e.target.value);
            send('ce-maximum', parseFloat(e.target.value));
        });
    </script>
</body>
</html>
