<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkFlow | Dashboard</title>
    <link rel="stylesheet" href="dashboard_styling.css" /> 
</head>
<body>
    <nav class="primary-nav">
        <a href="../front_pages/index.html" class="p-logo">
            <img src="../../assets/logo.png" width="250" height="50" alt="Website Logo">
        </a>
        <div class="nav-buttons">
            <div class="dropdown">
                <button class="circle"></button>
                <div class="dropdown-content">
                    <button class="dropdown-div">Account Settings</button>
                    <button onclick="createSettings()" class="dropdown-div">Preferences</button>
                    <button onclick="location.href='../front_pages/index.html'" class="dropdown-div">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div id="desktop"></div>
    <div class="dropup">
        <button class="dropbtn btn-filled">New Window</button>
        <div class="dropup-content">
            <button onclick="createCalendar('Calendar', '../dashboard_content/google_calendar.html')" class="dropup-div">New Calendar</button>
            <button onclick="createWindow('Video Calls')" class="dropup-div">New Video Call</button>
            <button onclick="createWindow('Chatrooms')" class="dropup-div">New Chatroom</button>
            <button onclick="createWindow('Notepad', '../dashboard_content/notepad.html')" class="dropup-div">New Notepad</button>
            <button onclick="createWindow('Task Manager', '../dashboard_content/tasks.html')" class="dropup-div">New Task Manager</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 WorkFlow. No rights reserved.</p>
    </footer>

    <script src="dashboard_functionality.js"></script>
</body>
</html>
