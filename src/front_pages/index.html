<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkFlow | Home</title>
    <link rel="stylesheet" href="fronts_styling.css" />

    <style>
        #waveCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;

            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <img src="../../assets/logo.png" width="250" height="50" alt="Website Logo">
        </a>
        <div class="nav-buttons">
            <a href="index.html" class="btn-outline">Home</a>
            <a href="about.html" class="btn-filled">About Us</a>
            <div class="vertical"></div>
            <a href="../account_pages/login.html" class="btn-filled">Login</a>
            <a href="../account_pages/signup.html" class="btn-filled">Sign Up</a>
        </div>
    </nav>

    <canvas id="waveCanvas"></canvas>

    <main class="primary-main">
        <div class="hero-content">
            <h1>Welcome to WorkFlow</h1>
            <p>We build professional, modern, and fast websites to help you communicate and plan effectively.</p>
            <a href="about.html" class="hero-btn">Discover Our Story</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 WorkFlow. No rights reserved.</p>
    </footer>

    <script>
        const canvas = document.getElementById("waveCanvas");
        const ctx = canvas.getContext("2d");

        let width, height;
        let cols, rows;
        let spacing = 20;

        let grid = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            cols = Math.floor(width / spacing);
            rows = Math.floor(height / spacing);

            grid = [];

            for (let i = 0; i < cols * rows; i++) {
                grid[i] = 0;
            }
        }

        window.addEventListener("resize", resize);
        resize();

        function disturb(mouseX, mouseY) {
            let col = Math.floor(mouseX / spacing);
            let row = Math.floor(mouseY / spacing);

            for (let dx = -5; dx <= 5; dx++) {
                for (let dy = -5; dy <= 5; dy++) {
                    let nx = col + dx;
                    let ny = row + dy;

                    if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                        let index = nx + ny * cols;

                        let dist = Math.sqrt(dx * dx + dy * dy);
                        let influence = Math.max(0, 1 - dist / 6);

                        grid[index] += influence * 2;
                        grid[index] = Math.min(grid[index], 8);
                    }
                }
            }
        }

        window.addEventListener("mousemove", (e) => {
            // fix cursor offset
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            disturb(x, y);
        });

        function update() {
            for (let i = 0; i < grid.length; i++) {
                grid[i] *= 0.92;

                if (grid[i] < 0.01) {
                    grid[i] = 0;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < grid.length; i++) {
                let value = grid[i];

                if (value <= 0.01) continue;

                let gx = i % cols;
                let gy = Math.floor(i / cols);

                let x = gx * spacing;
                let y = gy * spacing;

                let radius = value;
                let t = (gx / cols + (rows - gy) / rows) / 2;

                const blue = { r: 100, g: 55, b: 200 };
                const green = { r: 0, g: 200, b: 100 };

                function lighten(color, amount) {
                    return {
                        r: Math.floor(color.r + (255 - color.r) * amount),
                        g: Math.floor(color.g + (255 - color.g) * amount),
                        b: Math.floor(color.b + (255 - color.b) * amount)
                    };
                }

                const lightBlue = lighten(blue, 0.6);
                const lightGreen = lighten(green, 0.6);

                let r = Math.floor(lightBlue.r * (1 - t) + lightGreen.r * t);
                let g = Math.floor(lightBlue.g * (1 - t) + lightGreen.g * t);
                let b = Math.floor(lightBlue.b * (1 - t) + lightGreen.b * t);

                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${0.35 + value * 0.05})`;
                ctx.fill();
            }
        }

        function animate() {
            update();
            draw();
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
