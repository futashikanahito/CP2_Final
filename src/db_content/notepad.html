<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            margin: 0;
            height: 100%;
        }

        body {
            background-color: #141A26;
        }

        .input-group {
            width: 100%;
            height: 100%;
            display: flex;
        }

        .input-group textarea {
            flex: 1;
            box-sizing: border-box;
            padding: 20px;
            border: none;
            background: #162840;
            font-size: 1rem;
            color: #f0f0f0;
            outline: none;
            border-radius: 5px;
            resize: none;
        }
    </style>
</head>
<body>
    <div class="input-group">
        <textarea name="content" placeholder="Type something..."></textarea>
    </div>
</body>
</html>
