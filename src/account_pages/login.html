<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WorkFlow | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styling.css" />
</head>
<body class="secondary-body">
    <div class="s-container">
        <!-- LEFT SIDE (LOGIN) -->
        <div class="s-sample-panel">
            <div class="s-sample-box">
                <h1>WorkFlow Login</h1>

                <div class="s-input-group">
                    <label>Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username">
                </div>

                <div class="s-input-group">
                    <label>Password</label>
                    <input type="password" id="pw" name="pw" placeholder="Enter password">
                </div>

                <button class="s-sample-btn" onclick="handleLogin()">Login</button>

                <p id="login-error" style="color:red; display:none;">Incorrect username or password.</p>
            </div>
        </div>

        <!-- RIGHT SIDE (IMAGE) -->
        <div class="image-panel-login"></div>
    </div>

    <script src="js_refrences/login_backend.js"></script>
    <script>
        async function handleLogin() {
            const username = document.getElementById("username").value.trim();
            const pw = document.getElementById("pw").value;

            if (!username || !pw) {
                document.getElementById("login-error").textContent = "Please enter both username and password.";
                document.getElementById("login-error").style.display = "block";
                return;
            }

            const result = await login(username, pw);
            if (result) {
                window.location.href = "../dashboard/dashboard.html";
            } else {
                document.getElementById("login-error").textContent = "Incorrect username or password.";
                document.getElementById("login-error").style.display = "block";
            }
        }
    </script>
</body>
</html>
