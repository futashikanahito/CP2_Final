<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WorkFlow | Signup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="accounts_styling.css" />
</head>
<body>
    <div class="container">
        <!-- LEFT SIDE (IMAGE) -->
        <div class="image-panel-signup"></div>

        <!-- RIGHT SIDE (SIGNUP) -->
        <div class="sample-panel">
            <button class="back-btn" onclick="location.href='../front_pages/index.html'"><</button>
            <div class="sample-box">
                <h1>WorkFlow Signup</h1>

                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="pw" name="pw" placeholder="Enter password">
                        <button class="toggle-pw-btn" onclick="togglePassword()">Show</button>
                    </div>

                    <script>
                        function togglePassword() {
                        const input = document.getElementById('pw');
                        const btn = event.target;
                        
                        if (input.type === 'password') {
                        input.type = 'text';
                        btn.textContent = 'Hide';
                        } else {
                        input.type = 'password';
                        btn.textContent = 'Show';
                        }
                    }
                    </script>
                </div>

                <button class="sample-btn" onclick="handleSignup()">Sign Up</button>

                <button onclick="handleGoogleLogin()">
                    <svg width="18" height="18" viewBox="0 0 40 40" style="vertical-align:middle; margin-right:8px;">
                        <path d="M36.5 20.4c0-1.3-.1-2.6-.4-3.8H20v7.2h9.3c-.4 2-1.6 3.8-3.4 4.9v4h5.5c3.2-3 5.1-7.3 5.1-12.3z" fill="#4285F4"/>
                        <path d="M20 37c4.6 0 8.5-1.5 11.4-4.2l-5.5-4c-1.5 1-3.5 1.6-5.9 1.6-4.5 0-8.4-3-9.7-7.1H4.6v4.2C7.5 33.2 13.4 37 20 37z" fill="#34A853"/>
                        <path d="M10.3 23.3c-.7-2-.7-4.2 0-6.2v-4.2H4.6a17.9 17.9 0 000 14.6l5.7-4.2z" fill="#FBBC05"/>
                        <path d="M20 9.7c2.5 0 4.8.9 6.5 2.6l4.9-4.9C28.5 4.6 24.6 3 20 3 13.4 3 7.5 6.8 4.6 12.9l5.7 4.2C11.6 12.7 15.5 9.7 20 9.7z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>

                <p id="signup-error" style="color:red; display:none;"></p>
                <p id="signup-success" style="color:green; display:none;"></p>
            </div>
        </div>
    </div>

    <script src="login_backend.js"></script>
    <script>
        async function handleSignup() {
            const username = document.getElementById("username").value.trim();
            const pw = document.getElementById("pw").value;
            const errorEl = document.getElementById("signup-error");
            const successEl = document.getElementById("signup-success");

            errorEl.style.display = "none";
            successEl.style.display = "none";

            if (!username || !pw) {
                errorEl.textContent = "Please enter both a username and password.";
                errorEl.style.display = "block";
                return;
            }

            const result = await create_account(username, pw);

            if (result === "Password does not meet requirements.") {
                errorEl.textContent = "Password must be 8+ characters and include uppercase, lowercase, a number, and a special character.";
                errorEl.style.display = "block";
            } else if (result === "Username already exists.") {
                errorEl.textContent = "That username is already taken.";
                errorEl.style.display = "block";
            } else {
                successEl.textContent = "Account created! Sending to dashboard...";
                successEl.style.display = "block";
                setTimeout(() => {
                    window.location.href = "../dashboard/dashboard.html";
                }, 1500);
            }
        }
        const GOOGLE_CLIENT_ID = "75087933683-s5so198alkfphrc728rtjuqucggemhp0.apps.googleusercontent.com";
        function handleGoogleLogin() {
        const params = new URLSearchParams({
            client_id: GOOGLE_CLIENT_ID,
            redirect_uri: window.location.origin,
            response_type: "code",
            scope: "openid email profile",
            access_type: "offline",
            prompt: "consent"})
        };
    </script>
</body>
</html>
