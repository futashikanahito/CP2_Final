<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WorkFlow | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styling.css" />
</head>
<body class="secondary-body">
    <div class="s-container">
        <!-- LEFT SIDE (LOGIN) -->
        <div class="s-sample-panel">
            <div class="s-sample-box">
                <h1>WorkFlow Login</h1>
                <form action="/login" method="POST">
                    <div class="s-input-group">
                        <label>Username</label>
                        <input type="text" name="username" placeholder="Enter username">
                    </div>

                    <div class="s-input-group">
                        <label>Password</label>
                        <input type="password" name="pw" placeholder="Enter password">
                    </div>

                    <div class="red-footer">
                        <p>Password or Username incorrect</p>
                    </div>

                    <button type="submit" class="s-sample-btn" type="submit">Login</button>
                </form>
            </div>
        </div>
    
        <!-- RIGHT SIDE (IMAGE) -->
        <div class="image-panel-login"></div>
    </div>
</body>
</html>
