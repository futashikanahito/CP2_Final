<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkFlow | Settings</title>
    <style>
        /* CSS Variables for easy theme switching */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --panel-bg: #f4f4f5;
            --border-color: #e4e4e7;
            --button-bg: #007bff;
            --button-text: #ffffff;
        }

        /* Dark Mode Variables */
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #f4f4f5;
            --panel-bg: #1e1e1e;
            --border-color: #333333;
            --button-bg: #3b82f6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease, filter 0.3s ease;
            filter: brightness(100%);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .settings-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .settings-panel h1 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .setting-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .setting-group label {
            font-weight: 600;
            font-size: 0.95rem;
        }

        button {
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.85;
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            padding: 0;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .primary-footer {
            text-align: center;
            padding: 1rem;
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
    </style>
</head>
<body>

    <main>
        <div class="settings-panel">
            <h1>Settings</h1>

            <div class="setting-group">
                <label>Appearance</label>
                <button id="theme-btn">Enable Dark Mode</button>
            </div>

            <div class="setting-group">
                <label for="bg-picker">Custom Background Color</label>
                <input type="color" id="bg-picker" value="#ffffff">
            </div>

            <div class="setting-group">
                <label for="brightness-slider">Brightness</label>
                <input type="range" id="brightness-slider" min="30" max="150" value="100">
            </div>

            <div class="setting-group">
                <button onclick="location.href='../dashboard/dashboard.html'">Dashboard</button>
            </div>
        </div>
    </main>

    <footer class="primary-footer">
        <p>&copy; 2026 WorkFlow. No rights reserved.</p>
    </footer>

    <script>
        // Grab our elements from the DOM
        const themeBtn = document.getElementById('theme-btn');
        const bgPicker = document.getElementById('bg-picker');
        const brightnessSlider = document.getElementById('brightness-slider');
        const root = document.documentElement;

        // 1. Light/Dark Mode Toggle
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            
            if (document.body.classList.contains('dark-mode')) {
                themeBtn.textContent = 'Enable Light Mode';
                // Reset the color picker to a dark default so it matches the theme
                bgPicker.value = '#121212';
                root.style.setProperty('--bg-color', '#121212');
            } else {
                themeBtn.textContent = 'Enable Dark Mode';
                // Reset the color picker to a light default
                bgPicker.value = '#ffffff';
                root.style.setProperty('--bg-color', '#ffffff');
            }
        });

        // 2. Custom Background Color
        bgPicker.addEventListener('input', (event) => {
            // Overrides the CSS variable to instantly change the background
            root.style.setProperty('--bg-color', event.target.value);
        });

        // 3. Brightness Control
        brightnessSlider.addEventListener('input', (event) => {
            // Uses the CSS filter property to dim or brighten the entire page
            document.body.style.filter = `brightness(${event.target.value}%)`;
        });
    </script>
</body>
</html>
